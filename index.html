    // ============================================
    // CALCULATION ENGINE
    // ============================================

    function calculateVRAM(model, quantization, contextLength, concurrentRequests) {
      const q = QUANTIZATIONS.find(q => q.key === quantization) || QUANTIZATIONS[2];
      const bytesPerParam = q.bytes;
      
      let activeParams = model.active_params || model.params;
      let modelVRAM = activeParams * 1e9 * bytesPerParam;
      
      let kvPerToken;
      if (model.arch === 'mla') {
        // DeepSeek MLA: compressed latent representation
        const kvDim = model.kv_dim || 512;
        kvPerToken = 2 * model.layers * kvDim * bytesPerParam;
      } else {
        // Standard attention (MHA or GQA)
        const headDim = model.hidden / model.heads;
        const kvHeads = model.kv_heads || model.heads;
        kvPerToken = 2 * model.layers * kvHeads * headDim * bytesPerParam;
      }
      
      const totalKV = kvPerToken * contextLength * concurrentRequests;
      const overhead = 1.15;
      const totalVRAM = (modelVRAM + totalKV) * overhead;
      
      return {
        modelVRAM,
        kvCache: totalKV,
        overheadAmount: (modelVRAM + totalKV) * 0.15,
        totalVRAM,
        breakdown: {
          weights: modelVRAM,
          kv: totalKV,
          overhead: (modelVRAM + totalKV) * 0.15,
        }
      };
    }

    function recommendGPU(totalVRAM) {
      const suitable = GPUS.filter(g => g.vram >= totalVRAM / 1e9);
      
      if (suitable.length > 0) {
        // Pick cheapest suitable GPU
        const best = suitable.reduce((min, g) => g.hourly < min.hourly ? g : min, suitable[0]);
        return { gpu: best, count: 1, multi: false };
      }
      
      // Need multi-GPU
      const sorted = [...GPUS].sort((a, b) => b.vram - a.vram);
      for (const gpu of sorted) {
        const count = Math.ceil((totalVRAM / 1e9) / gpu.vram);
        if (count <= 8) {
          return { gpu, count, multi: true };
        }
      }
      
      // Fallback to H200 x 8
      return { gpu: GPUS[GPUS.length - 1], count: 8, multi: true };
    }

    function calculateCosts(dailyVolume, avgTokens, inputRatio, gpuRec, apiModelName) {
      const monthlyDays = 30;
      const monthlyCalls = dailyVolume * monthlyDays;
      const totalTokensMonthly = monthlyCalls * avgTokens;
      
      // Self-hosted
      const selfHostedMonthly = gpuRec.gpu.hourly * 730 * gpuRec.count;
      
      // API
      const apiPricing = API_PRICING.find(p => p.model === apiModelName) || API_PRICING[0];
      const inputTokens = totalTokensMonthly * (inputRatio / 100);
      const outputTokens = totalTokensMonthly * ((100 - inputRatio) / 100);
      const apiMonthly = (inputTokens / 1e6 * apiPricing.input) + (outputTokens / 1e6 * apiPricing.output);
      
      // Per transcript
      const selfHostedPerTranscript = selfHostedMonthly / monthlyCalls;
      const apiPerTranscript = apiMonthly / monthlyCalls;
      
      return {
        selfHostedMonthly,
        apiMonthly,
        selfHostedPerTranscript,
        apiPerTranscript,
        winner: selfHostedMonthly < apiMonthly ? 'self' : 'api',
        savings: Math.abs(selfHostedMonthly - apiMonthly),
        savingsPercent: Math.abs(selfHostedMonthly - apiMonthly) / Math.max(selfHostedMonthly, apiMonthly) * 100,
        apiPricing,
      };
    }

    function generateBreakEvenData(dailyVolume, avgTokens, inputRatio, gpuRec, apiModelName) {
      const apiPricing = API_PRICING.find(p => p.model === apiModelName) || API_PRICING[0];
      const selfHostedMonthly = gpuRec.gpu.hourly * 730 * gpuRec.count;

      // Compute break-even point to center the chart
      const blendedPrice = (apiPricing.input * (inputRatio / 100) + apiPricing.output * ((100 - inputRatio) / 100));
      const tokensPerMonthAtOneCall = avgTokens * 30;
      const costPerMonthAtOneCall = (tokensPerMonthAtOneCall / 1e6) * blendedPrice;
      const exactBreakEven = costPerMonthAtOneCall > 0 ? selfHostedMonthly / costPerMonthAtOneCall : 1000;

      // Chart range: 0 to max(2× break-even, 5000) so the intersection is visible
      const maxVolume = Math.max(5000, Math.ceil(exactBreakEven * 2));
      const step = Math.max(50, Math.round(maxVolume / 50));

      const volumes = [];
      for (let vol = 0; vol <= maxVolume; vol += step) {
        volumes.push(vol);
      }
      if (volumes[volumes.length - 1] !== maxVolume) {
        volumes.push(maxVolume);
      }

      return volumes.map(vol => {
        const monthlyCalls = vol * 30;
        const totalTokens = monthlyCalls * avgTokens;
        const inputTokens = totalTokens * (inputRatio / 100);
        const outputTokens = totalTokens * ((100 - inputRatio) / 100);
        const apiCost = (inputTokens / 1e6 * apiPricing.input) + (outputTokens / 1e6 * apiPricing.output);

        return {
          volume: vol,
          selfHosted: selfHostedMonthly,
          api: apiCost,
        };
      });
    }

    function findBreakEven(data) {
      for (let i = 1; i < data.length; i++) {
        const prev = data[i - 1];
        const curr = data[i];
        if ((prev.selfHosted > prev.api && curr.selfHosted <= curr.api) ||
            (prev.selfHosted < prev.api && curr.selfHosted >= curr.api)) {
          // Linear interpolation
          const ratio = (prev.api - prev.selfHosted) / ((curr.selfHosted - curr.api) - (prev.selfHosted - prev.api));
          return Math.round(prev.volume + ratio * (curr.volume - prev.volume));
        }
      }
      return null;
    }

    function estimateArchitecture(params) {

      // Interpolate from known modern dense GQA architectures

      } else if (params <= 4) {
        const t = (params - 1) / 3;
        hidden = Math.round((1024 + t * 1536) / 128) * 128;
        layers = Math.round(24 + t * 12);
        heads = Math.round((16 + t * 4) / 8) * 8;
        kvHeads = 4;
      } else if (params <= 14) {
        const t = (params - 4) / 10;
        hidden = Math.round((2560 + t * 2560) / 128) * 128;
        layers = Math.round(36 + t * 4);
        heads = Math.round((20 + t * 20) / 8) * 8;
        kvHeads = 8;
      } else if (params <= 32) {
        const t = (params - 14) / 18;
        hidden = Math.round((5120 + t * 3072) / 128) * 128;
        layers = Math.round(40 + t * 24);
        heads = Math.round((40 + t * 24) / 8) * 8;
        kvHeads = 8;
      } else if (params <= 70) {
        const t = (params - 32) / 38;
        hidden = Math.round((8192 + t * 4096) / 128) * 128;
        layers = Math.round(64 + t * 16);
        heads = Math.round((64 + t * 32) / 8) * 8;
        kvHeads = 8;
      } else {
        const t = Math.min(1, (params - 70) / 330);
        hidden = Math.round((12288 + t * 4096) / 128) * 128;
        layers = Math.round(80 + t * 40);
        heads = Math.round((96 + t * 32) / 8) * 8;
        kvHeads = 8;
      }
      
      return { hidden, layers, heads, kvHeads };
    }

    function BreakEvenChart({ data, breakEven }) {
      const [hovered, setHovered] = useState(null);
      const [tooltip, setTooltip] = useState({ x: 0, y: 0, visible: false, data: null });
      
      const width = 600;
      const height = 280;
      const padding = { top: 20, right: 20, bottom: 50, left: 60 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      
      const maxCost = Math.max(
        ...data.map(d => Math.max(d.selfHosted, d.api))
      );
      
      const maxVolume = data.length > 0 ? data[data.length - 1].volume : 5000;

      const xScale = (vol) => {
        return padding.left + (vol / maxVolume) * chartWidth;
      };
      
      const yScale = (cost) => {
        return padding.top + chartHeight - (cost / maxCost) * chartHeight;
      };
      
      const selfHostedPath = data.map((d, i) => 
        `${i === 0 ? 'M' : 'L'} ${xScale(d.volume)} ${yScale(d.selfHosted)}`
      ).join(' ');
      
      const apiPath = data.map((d, i) => 
        `${i === 0 ? 'M' : 'L'} ${xScale(d.volume)} ${yScale(d.api)}`
      ).join(' ');
      
      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        // Find closest data point
        let closest = data[0];
        let minDist = Infinity;
        
        for (const d of data) {
          const dx = xScale(d.volume) - x;
          const dist = Math.abs(dx);
          if (dist < minDist) {
            minDist = dist;
            closest = d;
          }
        }
        
        if (minDist < 30) {
          setTooltip({
            x: xScale(closest.volume),
            y: Math.min(yScale(closest.selfHosted), yScale(closest.api)) - 10,
            visible: true,
            data: closest,
          });
        } else {
          setTooltip(prev => ({ ...prev, visible: false }));
        }
      };
      
      return (
        <div className="relative">
          <svg 
            viewBox={`0 0 ${width} ${height}`} 
            className="w-full"
            style={{ maxHeight: '320px' }}
            onMouseMove={handleMouseMove}
            onMouseLeave={() => setTooltip(prev => ({ ...prev, visible: false }))}
          >
            {/* Grid lines */}
            {[0, 0.25, 0.5, 0.75, 1].map(tick => {
              const y = padding.top + chartHeight * tick;
              return (
                <line key={tick} x1={padding.left} y1={y} x2={width - padding.right} y2={y} 
                  stroke="var(--border)" strokeWidth={0.5} strokeDasharray="4 4" />
              );
            })}
            
            {/* Axes */}
            <line x1={padding.left} y1={padding.top} x2={padding.left} y2={height - padding.bottom} 
              stroke="var(--text-muted)" strokeWidth={1} />
            <line x1={padding.left} y1={height - padding.bottom} x2={width - padding.right} y2={height - padding.bottom} 
              stroke="var(--text-muted)" strokeWidth={1} />
            
            {/* Y-axis labels */}
            {[0, 0.25, 0.5, 0.75, 1].map(tick => {
              const value = maxCost * (1 - tick);
              const y = padding.top + chartHeight * tick;
              return (
                <text key={tick} x={padding.left - 8} y={y + 4} textAnchor="end" 
                  fontSize="10" fill="var(--text-muted)">
                  ${value < 1000 ? value.toFixed(0) : (value / 1000).toFixed(1) + 'k'}
                </text>
              );
            })}
            
            {/* X-axis labels */}
            {(() => {
              const ticks = [];
              const step = Math.max(500, Math.round(maxVolume / 5));
              for (let v = 0; v <= maxVolume; v += step) {
                ticks.push(v);
              }
              if (ticks[ticks.length - 1] !== maxVolume) ticks.push(maxVolume);
              return ticks.map(vol => (
                <text key={vol} x={xScale(vol)} y={height - padding.bottom + 18} textAnchor="middle"
                  fontSize="10" fill="var(--text-muted)">
                  {vol >= 1000 ? (vol / 1000).toFixed(1) + 'k' : vol}
                </text>
              ));
            })()}
            
            {/* Lines */}
            <path d={selfHostedPath} fill="none" stroke="var(--chart-self)" strokeWidth={2.5} />
            <path d={apiPath} fill="none" stroke="var(--chart-api)" strokeWidth={2.5} />
            
            {/* Break-even marker */}
            {breakEven && (
              <>
                <line 
                  x1={xScale(breakEven)} y1={padding.top} 
                  x2={xScale(breakEven)} y2={height - padding.bottom}
                  stroke="var(--accent-primary)" strokeWidth={1.5} strokeDasharray="6 4" 
                />
                <circle cx={xScale(breakEven)} cy={yScale(data.find(d => d.volume >= breakEven)?.selfHosted || 0)} 
                  r={5} fill="var(--accent-primary)" stroke="var(--bg-primary)" strokeWidth={2} />
                <text x={xScale(breakEven)} y={padding.top - 6} textAnchor="middle" 
                  fontSize="11" fontWeight="600" fill="var(--accent-primary)">
                  Break-even: {breakEven >= 1000 ? (breakEven / 1000).toFixed(1) + 'k' : breakEven}/day
                </text>
              </>
            )}
            
            {/* Legend */}
            <g transform={`translate(${width - padding.right - 140}, ${padding.top})`}>
              <line x1={0} y1={0} x2={20} y2={0} stroke="var(--chart-self)" strokeWidth={2.5} />
              <text x={26} y={4} fontSize="11" fill="var(--text-secondary)">Self-hosted</text>
              <line x1={0} y1={18} x2={20} y2={18} stroke="var(--chart-api)" strokeWidth={2.5} />
              <text x={26} y={22} fontSize="11" fill="var(--text-secondary)">API</text>
            </g>
          </svg>
          
          {/* Tooltip */}
          <div 
            className={`chart-tooltip ${tooltip.visible ? 'visible' : ''}`}
            style={{
              left: `${(tooltip.x / width) * 100}%`,
              top: `${(tooltip.y / height) * 100}%`,
              transform: 'translate(-50%, -100%)',
            }}
          >
            {tooltip.data && (
              <div>
                <div className="font-semibold mb-1" style={{ color: 'var(--text-primary)' }}>
                  {tooltip.data.volume >= 1000 ? (tooltip.data.volume / 1000).toFixed(1) + 'k' : tooltip.data.volume} calls/day
                </div>
                <div style={{ color: 'var(--chart-self)' }}>
                  Self-hosted: ${tooltip.data.selfHosted.toFixed(0)}/mo
                </div>
                <div style={{ color: 'var(--chart-api)' }}>
                  API: ${tooltip.data.api.toFixed(0)}/mo
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [dark, setDark] = useState(() => {
        try {
          const saved = localStorage.getItem('theme');
          return saved ? saved === 'dark' : true;
        } catch { return true; }
      });
      
      const [family, setFamily] = useState('qwen3');
      const [variant, setVariant] = useState('Qwen3-14B');
      const [quantization, setQuantization] = useState('q4_k_m');
      const [contextLength, setContextLength] = useState(8192);
      const [concurrent, setConcurrent] = useState(8);
      const [dailyVolume, setDailyVolume] = useState(500);
      const [avgTokens, setAvgTokens] = useState(1500);
      const [inputRatio, setInputRatio] = useState(70);
      const [customParams, setCustomParams] = useState(7);
      const [apiModel, setApiModel] = useState('GPT-4o');
      
      useEffect(() => {
        try {
          localStorage.setItem('theme', dark ? 'dark' : 'light');
        } catch {}
        if (dark) {
          document.documentElement.classList.remove('light');
        } else {
          document.documentElement.classList.add('light');
        }
      }, [dark]);
      
      const model = useMemo(() => {
        const familyData = MODELS[family];
        const base = familyData.variants.find(v => v.name === variant) || familyData.variants[0];
        
        if (family === 'custom') {
          const arch = estimateArchitecture(customParams);
          return {
            ...base,
            params: customParams,
            ...arch,
            context: 131072,
          };
        }
        
        return base;
      }, [family, variant, customParams]);
      
      const vramData = useMemo(() => 
        calculateVRAM(model, quantization, contextLength, concurrent),
      [model, quantization, contextLength, concurrent]);
      
      const gpuRec = useMemo(() => 
        recommendGPU(vramData.totalVRAM),
      [vramData]);
      
      const costs = useMemo(() => 
        calculateCosts(dailyVolume, avgTokens, inputRatio, gpuRec, apiModel),
      [dailyVolume, avgTokens, inputRatio, gpuRec, apiModel]);
      
      const breakEvenData = useMemo(() => 
        generateBreakEvenData(dailyVolume, avgTokens, inputRatio, gpuRec, apiModel),
      [dailyVolume, avgTokens, inputRatio, gpuRec, apiModel]);
      
      const breakEven = useMemo(() => findBreakEven(breakEvenData), [breakEvenData]);

        setDailyVolume(preset.dailyVolume);
        setAvgTokens(preset.avgTokens);
        setInputRatio(preset.inputRatio);
      };
      
      const contextWarning = contextLength > model.context 
        ? `Exceeds model's trained context (${model.context.toLocaleString()})`
        : null;

        const gb = bytes / 1e9;
        if (gb >= 1000) return `${(gb / 1024).toFixed(2)} TB`;
        return `${gb.toFixed(2)} GB`;
      };
      
      const formatTokens = (n) => {
        if (n >= 1e6) return `${(n / 1e6).toFixed(1)}M`;
        if (n >= 1e3) return `${(n / 1e3).toFixed(1)}K`;
        return n.toString();
      };

                      const pct = (item.value / vramData.totalVRAM * 100).toFixed(1);
                      return (
                        <div key={item.label}>
                          <div className="flex justify-between text-sm mb-1">
                            <span style={{ color: 'var(--text-secondary)' }}>{item.label}</span>
                            <span className="font-mono" style={{ color: item.color }}>
                              {formatBytes(item.value)} ({pct}%)
                            </span>
                          </div>
                          <div className="h-2 rounded-full overflow-hidden" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                            <div 
                              className="h-full rounded-full bar-fill"
                              style={{ width: `${pct}%`, backgroundColor: item.color }}
                            />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  
                  <div className="mt-4 pt-4 text-xs" style={{ color: 'var(--text-muted)', borderTop: '1px solid var(--border)' }}>
                    Architecture: {model.arch.toUpperCase()} · 
                    {model.arch === 'mla' ? ` MLA compressed KV` : 
                      model.arch === 'moe' ? ` MoE (top-${model.moe_topk})` :
                      ` ${model.layers} layers, ${model.hidden} hidden, ${model.kv_heads || model.heads} KV heads`}
                  </div>
                </div>
                
                {/* GPU Recommendation */}
                <div className="gruv-card p-5">
                  <h2 className="text-sm font-semibold uppercase tracking-wider mb-4" 
                    style={{ color: 'var(--text-muted)' }}>
                    Recommended Infrastructure
                  </h2>
                  
                  <div className="flex items-center gap-4 mb-4">
                    <div 
                      className="w-16 h-16 rounded-xl flex items-center justify-center text-2xl font-bold"
                      style={{ backgroundColor: 'var(--accent-primary)', color: 'var(--bg-primary)' }}
                    >
                      {gpuRec.gpu.name.split(' ')[0]}
                    </div>
                    <div className="flex-1">
                      <div className="flex items-center gap-2">
                        <span className="text-lg font-bold" style={{ color: 'var(--text-primary)' }}>
                          {gpuRec.gpu.name}
                        </span>
                        {gpuRec.multi && (
                          <span 
                            className="badge"
                            style={{ backgroundColor: 'var(--accent-danger)', color: 'white' }}
                          >
                            {gpuRec.count}× Multi-GPU
                          </span>
                        )}
                      </div>
                      <div className="text-sm mt-0.5" style={{ color: 'var(--text-secondary)' }}>
                        {gpuRec.gpu.vram} GB VRAM · ${gpuRec.gpu.hourly}/hr · 
                        Total: {gpuRec.gpu.vram * gpuRec.count} GB
                      </div>
                    </div>
                    <div className="text-right">
                      <div className="text-2xl font-bold font-mono" style={{ color: 'var(--accent-primary)' }}>
                        ${(gpuRec.gpu.hourly * 730 * gpuRec.count).toFixed(0)}
                      </div>
                      <div className="text-xs" style={{ color: 'var(--text-muted)' }}>/month</div>
                    </div>
                  </div>
                  
                  {gpuRec.multi && (
                    <div className="text-xs p-3 rounded-lg" style={{ backgroundColor: 'var(--bg-tertiary)', color: 'var(--accent-danger)' }}>
                      ⚠ Model requires more VRAM than any single GPU. Multi-GPU inference adds complexity (tensor parallelism, communication overhead).
                    </div>
                  )}
                </div>
                
                {/* Cost Comparison */}
                <div className="gruv-card p-5">
                  <h2 className="text-sm font-semibold uppercase tracking-wider mb-4" 
                    style={{ color: 'var(--text-muted)' }}>
                    Monthly Cost Comparison
                  </h2>
                  
                  <div className="grid grid-cols-2 gap-4 mb-4">
                    <div className="p-4 rounded-xl" style={{ backgroundColor: 'var(--bg-secondary)' }}>
                      <div className="text-xs font-medium uppercase tracking-wider mb-1" style={{ color: 'var(--chart-self)' }}>
                        Self-hosted
                      </div>
                      <div className="text-3xl font-bold font-mono" style={{ color: 'var(--text-primary)' }}>
                        ${costs.selfHostedMonthly.toFixed(0)}
                      </div>
                      <div className="text-sm mt-1" style={{ color: 'var(--text-muted)' }}>
                        ${costs.selfHostedPerTranscript.toFixed(4)}/transcript
                      </div>
                    </div>
                    
                    <div className="p-4 rounded-xl" style={{ backgroundColor: 'var(--bg-secondary)' }}>
                      <div className="text-xs font-medium uppercase tracking-wider mb-1" style={{ color: 'var(--chart-api)' }}>
                        API ({costs.apiPricing.provider})
                      </div>
                      <div className="text-3xl font-bold font-mono" style={{ color: 'var(--text-primary)' }}>
                        ${costs.apiMonthly.toFixed(0)}
                      </div>
                      <div className="text-sm mt-1" style={{ color: 'var(--text-muted)' }}>
                        ${costs.apiPerTranscript.toFixed(4)}/transcript
                      </div>
                    </div>
                  </div>
                  
                  <div className="flex items-center justify-between p-3 rounded-lg" 
                    style={{ backgroundColor: costs.winner === 'self' ? 'rgba(184, 187, 38, 0.1)' : 'rgba(251, 73, 52, 0.1)' }}>
                    <span className="text-sm font-medium" style={{ color: 'var(--text-secondary)' }}>
                      {costs.winner === 'self' ? 'Self-hosted wins by' : 'API wins by'}
                    </span>
                    <span className="text-lg font-bold font-mono" 
                      style={{ color: costs.winner === 'self' ? 'var(--accent-success)' : 'var(--accent-danger)' }}>
                      ${costs.savings.toFixed(0)}/mo ({costs.savingsPercent.toFixed(1)}%)
                    </span>
                  </div>
                </div>
                
                {/* Break-even Chart */}
                <div className="gruv-card p-5">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-sm font-semibold uppercase tracking-wider" 
                      style={{ color: 'var(--text-muted)' }}>
                      Break-even Analysis
                    </h2>
                    {breakEven && (
                      <span className="text-xs font-medium px-2 py-1 rounded-md" 
                        style={{ backgroundColor: 'var(--accent-primary)', color: 'var(--bg-primary)' }}>
                        Break-even at {breakEven >= 1000 ? (breakEven / 1000).toFixed(1) + 'k' : breakEven}/day
                      </span>
                    )}
                  </div>
                  
                  <BreakEvenChart data={breakEvenData} breakEven={breakEven} />
                  
                  <div className="mt-3 text-xs" style={{ color: 'var(--text-muted)' }}>
                    Self-hosted cost is flat (always-on GPU). API cost scales linearly with token volume — you pay per token. 
                    The intersection shows the exact daily volume where renting a GPU becomes cheaper than API calls.
                  </div>
                </div>
              </div>
            </div>
            
            {/* Footer */}
            <footer className="mt-12 pt-6 text-center text-xs" style={{ color: 'var(--text-muted)', borderTop: '1px solid var(--border)' }}>
              <p>
                Architecture data based on published technical reports. GPU pricing approximate (RunPod/Lambda).
                API pricing from OpenRouter as of April 2026. Closed-source model architectures are estimates.
              </p>
              <p className="mt-2 flex items-center justify-center gap-4">
                <a href="https://www.rituraj.info/posts/on-prem-llm-deployment-cto/" target="_blank" rel="noopener noreferrer" className="underline hover:no-underline transition-colors" style={{ color: 'var(--accent-primary)' }}>
                  Read the blog post
                </a>
                <span style={{ color: 'var(--border)' }}>|</span>
                <a href="https://github.com/ree2raz/llm-cost-calculator" target="_blank" rel="noopener noreferrer" className="underline hover:no-underline transition-colors" style={{ color: 'var(--accent-primary)' }}>
                  GitHub repo
                </a>
              </p>
            </footer>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
